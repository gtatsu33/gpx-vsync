<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([35.0, 135.0], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
    }).addTo(map);

    var currentLatLngs = [];
    var routeSegments = [];
    var marker = null;

    function clearRouteSegments() {
        routeSegments.forEach(function(line) { map.removeLayer(line); });
        routeSegments = [];
    }

    function splitIntoSegments(latlngs, inRangeFlags) {
        var segments = [];
        var current = null;
        for (var i = 0; i < latlngs.length; i++) {
            var flag = inRangeFlags[i];
            if (!current || current.inRange !== flag) {
                if (current) segments.push(current);
                current = {inRange: flag, latlngs: []};
                // セグメントの継ぎ目で線が途切れないよう、前の点も含める
                if (i > 0) current.latlngs.push(latlngs[i - 1]);
            }
            current.latlngs.push(latlngs[i]);
        }
        if (current) segments.push(current);
        return segments;
    }

    function renderRouteSegments(inRangeFlags) {
        clearRouteSegments();
        if (currentLatLngs.length === 0) return;
        var segments = splitIntoSegments(currentLatLngs, inRangeFlags);
        segments.forEach(function(seg) {
            if (seg.inRange) {
                routeSegments.push(
                    L.polyline(seg.latlngs, {color: '#16a34a', weight: 3}).addTo(map)
                );
            } else {
                // クロップされる領域: 緑の縁取りは付けず、範囲内と同じ
                // 太さのグレー単色にする
                routeSegments.push(
                    L.polyline(seg.latlngs, {color: '#6b7280', weight: 3}).addTo(map)
                );
            }
        });
    }

    function loadRoute(latlngs) {
        currentLatLngs = latlngs;
        renderRouteSegments(latlngs.map(function() { return true; }));
        if (latlngs.length > 0) {
            map.fitBounds(L.latLngBounds(latlngs));
        }
    }

    function updateRouteRanges(inRangeFlags) {
        renderRouteSegments(inRangeFlags);
    }

    function updateMarker(lat, lon) {
        if (!marker) {
            marker = L.circleMarker([lat, lon], {
                radius: 8, color: 'red', fillColor: '#f03',
                fillOpacity: 0.8
            }).addTo(map);
        } else {
            marker.setLatLng([lat, lon]);
            marker.setStyle({opacity: 1, fillOpacity: 0.8});
        }
        map.panTo([lat, lon]);
    }

    function hideMarker() {
        if (marker) {
            marker.setStyle({opacity: 0, fillOpacity: 0});
        }
    }

    function clearMap() {
        clearRouteSegments();
        currentLatLngs = [];
        if (marker) { map.removeLayer(marker); marker = null; }
    }
  </script>
</body>
</html>
